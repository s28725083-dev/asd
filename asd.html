<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }

        .boximg {
            display: flex;
            gap: 20px;
            width: 50%;
        }

        .boximg div {
            width: 100%;
            height: 100px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body>

    <div class="box"></div>

    <script>
        let box = document.getElementsByClassName("box")[0];
        let arr = ["cat", "dog", "home"];

        let arr1 = arr[0];
        let arr2 = arr[1];
        let arr3 = arr[2];

        for (let i = 0; i < 3; i++) {
            let row = document.createElement("div");
            row.className = "boximg";
            box.appendChild(row);

            let img1 = document.createElement("div"); img1.className = "redder"; row.appendChild(img1);
            let img2 = document.createElement("div"); img2.className = "redder"; row.appendChild(img2);
            let img3 = document.createElement("div"); img3.className = "redder"; row.appendChild(img3);

            if (i === 0) {
                img1.style.backgroundImage = "url('/" + arr1 + "/img1.jpg')";
                img2.style.backgroundImage = "url('/" + arr1 + "/img2.jpg')";
                img3.style.backgroundImage = "url('/" + arr1 + "/img3.jpg')";        
            } else if (i === 1) {
                img1.style.backgroundImage = "url('/" + arr2 + "/img1.jpg')";
                img2.style.backgroundImage = "url('/" + arr2 + "/img2.jpg')";
                img3.style.backgroundImage = "url('/" + arr2 + "/img3.jpg')";        
            } else if (i === 2) {
                img1.style.backgroundImage = "url('/" + arr3 + "/img1.jpg')";
                img2.style.backgroundImage = "url('/" + arr3 + "/img2.jpg')";
                img3.style.backgroundImage = "url('/" + arr3 + "/img3.jpg')";    
            }
        }
    </script>

</body>
</html>
